name: ci

# The public test gates: the proxy pytest suite against a disposable Postgres
# service container, plus the dashboard typecheck / build / vitest. Same
# commands as a local run — see proxy/tests/README.md ("CI" section).

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  proxy:
    if: github.repository == 'OtoDock/oto-dock'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.14-alpine
        env:
          POSTGRES_USER: otodock
          POSTGRES_PASSWORD: otodock
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U otodock"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            proxy/requirements.txt
            proxy/requirements-test.txt

      - name: System tools used by the suite
        # The sysctl re-allows unprivileged user namespaces (Ubuntu 24.04
        # runners restrict them via AppArmor), which the sandbox
        # network-isolation integration tests need for pasta/bwrap.
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q bubblewrap passt iproute2 ripgrep
          sudo sysctl -q -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install proxy dependencies
        # cwd = repo root: the local audio package is a path dependency.
        run: |
          python -m pip install -U pip
          python -m pip install ./audio
          python -m pip install -r proxy/requirements.txt -r proxy/requirements-test.txt

      - name: pytest
        working-directory: proxy
        env:
          TEST_DATABASE_URL: postgresql://otodock:otodock@localhost:5432/otodock_test
        run: python -m pytest -n 8 -q

  dashboard:
    if: github.repository == 'OtoDock/oto-dock'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: npm ci
        working-directory: dashboard
        run: npm ci --no-audit --no-fund

      - name: typecheck
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: build
        working-directory: dashboard
        run: npm run build

      - name: vitest
        working-directory: dashboard
        run: npx vitest run
