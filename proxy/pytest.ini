[pytest]
# Test suite for the OtoDock proxy. Requires a PostgreSQL server; conftest.py
# auto-creates and wipes disposable `otodock_test*` databases and never touches
# the real `otodock` database. See tests/README.md for how to run.
testpaths = tests
asyncio_mode = strict

# Per-test wall-clock cap (pytest-timeout) so a single wedged test can never
# hang the whole suite / CI. Auto-disabled under a debugger. Override on a
# specific test with @pytest.mark.timeout(N).
timeout = 120

markers =
    slow: marks a test as slow (deselect with -m "not slow")
